<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase - Login</title>
    <!-- this is bootstrap link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<!-- styling the login button using bootstrap -->

<body class="bg-light">
    <div class="container vh-100 d-flex justiify-content-center align-items-center">
        <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
            <div class=" text-center mb-4"> <i class="bi bi-p-square-fill fs-1 text-danger-emphasis"></i>
                
                <h2 class="fw-bold text-danger-emphasis">ParkEase</h2>
                <p class=" text-muted">Login to continue</p>
            </div>
            <!-- this is the login form -->
            <form>
                <!-- this section is for the email address -->
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Username</label>
                    <input type="email" class="form-control" id="exampleInputusername" aria-describedby="emailHelp">
                   
                </div>
                <!-- this section is for the password -->
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Password</label>
                    <input type="password" class="form-control" id="exampleInputPassword1">
                </div>
                <!-- this section is for the submit button -->
               <button type="submit" class="btn w-100 py-2 fw-bold"><a href="dashboard.html" class="btn btn-danger  w-100">Login</a></button> 
            </form>

        </div>


</body>

</html>
